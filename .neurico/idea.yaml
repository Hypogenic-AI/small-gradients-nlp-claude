idea:
  title: Small Gradients as a the Potential Mechanism for Synthetic Data Issues
  domain: nlp
  hypothesis: 'Synthetic data generated by LLMs tends to have lower perplexity and
    higher similarity compared to human-authored data, which may result in the need
    for more synthetic data to achieve the same learning outcomes and can cause model
    collapse due to larger gradients in directions unrelated to LLM-style data.

    '
  background:
    description: "Synthetic data tends to have lower perplexity than human authored\
      \ data because LLMs tend to write similarly. I hypothesize that this is both\
      \ why (a) often you need more synthetic data to learn something than if you\
      \ had human-authored data and (b) synthetic data causes collapse\u2014because\
      \ the relative size of gradients in certain directions that aren't related to\
      \ LLM-style is larger.\n"
